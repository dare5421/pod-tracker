<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ردیاب پاد</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 20px; text-align: center; }
        .card { background: #1e293b; border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .counter { font-size: 3rem; font-weight: bold; color: #38bdf8; margin: 10px 0; }
        .buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        button { border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: transform 0.1s; }
        .add-btn { background: #38bdf8; color: #000; }
        .undo-btn { background: #f43f5e; color: #fff; width: 100%; padding: 10px; border-radius: 12px; }
        
        /* استایل جدید برای ۴ باکس لاگ */
        .logs-container { margin-top: 20px; }
        .daily-log-card { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
        .log-box { background: #334155; border-radius: 10px; padding: 10px 5px; text-align: center; }
        .log-box span { display: block; font-size: 0.7rem; opacity: 0.7; margin-bottom: 4px; }
        .log-box b { font-size: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <div id="date-display">امروز</div>
        <div class="counter" id="total-count">0</div>
        
        <div class="logs-container">
            <div class="daily-log-card" id="current-day-log">
                <div class="log-box"><span>تاریخ</span><b id="log-date">-</b></div>
                <div class="log-box"><span>صبح</span><b id="log-morning">0</b></div>
                <div class="log-box"><span>عصر</span><b id="log-afternoon">0</b></div>
                <div class="log-box"><span>شب</span><b id="log-night">0</b></div>
            </div>
        </div>
    </div>

    <div class="buttons">
        <button class="add-btn" onclick="addPuff(3)">+3</button>
        <button class="add-btn" onclick="addPuff(5)">+5</button>
        <button class="add-btn" onclick="addPuff(7)">+7</button>
    </div>
    <button class="undo-btn" onclick="undoPuff()">بازگشت</button>

    <script>
        let data = JSON.parse(localStorage.getItem('puffData')) || { count: 0, morning: 0, afternoon: 0, night: 0, lastDate: new Date().toLocaleDateString('fa-IR') };

        function updateUI() {
            document.getElementById('total-count').innerText = data.count;
            document.getElementById('log-date').innerText = new Date().toLocaleDateString('fa-IR', { day: 'numeric', month: 'short' });
            document.getElementById('log-morning').innerText = data.morning;
            document.getElementById('log-afternoon').innerText = data.afternoon;
            document.getElementById('log-night').innerText = data.night;
            localStorage.setItem('puffData', JSON.stringify(data));
        }

        function getPeriod() {
            const hour = new Date().getHours();
            if (hour >= 7 && hour < 14) return 'morning';
            if (hour >= 14 && hour < 20) return 'afternoon';
            return 'night';
        }

        function addPuff(amount) {
            data.count += amount;
            data[getPeriod()] += amount;
            updateUI();
        }

        function undoPuff() {
            // ساده‌سازی: برای بازگشت، فرض می‌کنیم آخرین حرکت در همین بازه بوده
            // در صورت نیاز به لاگ دقیق‌تر، باید تاریخچه آرایه‌ای داشته باشیم.
            alert("این نسخه بازگشت ساده دارد؛ برای مدیریت دقیق‌تر لاگ‌ها، پیشنهاد می‌کنم سیستم ثبت تراکنش پیاده کنیم.");
        }

        // بررسی ریست ساعت ۷ صبح
        setInterval(() => {
            const now = new Date();
            if (now.getHours() === 7 && now.getMinutes() === 0) {
                data = { count: 0, morning: 0, afternoon: 0, night: 0, lastDate: now.toLocaleDateString('fa-IR') };
                updateUI();
            }
        }, 60000);

        updateUI();
    </script>
</body>
</html>
