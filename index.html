<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ردیاب پاد</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 20px; text-align: center; }
        .card { background: #1e293b; border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .counter { font-size: 3rem; font-weight: bold; color: #38bdf8; margin: 10px 0; }
        .buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        button { border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: transform 0.1s; }
        .add-btn { background: #38bdf8; color: #000; }
        .undo-btn { background: #f43f5e; color: #fff; width: 100%; padding: 10px; border-radius: 12px; margin-bottom: 20px; }
        
        /* استایل ۴ قسمتی */
        .log-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
        .log-box { background: #334155; border-radius: 10px; padding: 8px 2px; text-align: center; }
        .log-box span { display: block; font-size: 0.65rem; opacity: 0.7; margin-bottom: 2px; }
        .log-box b { font-size: 0.9rem; }
        
        h3 { text-align: right; margin-top: 30px; font-size: 1rem; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="card">
        <div id="date-display">امروز</div>
        <div class="counter" id="total-count">0</div>
        <div class="log-grid">
            <div class="log-box"><span>تاریخ</span><b id="log-date">-</b></div>
            <div class="log-box"><span>صبح</span><b id="log-morning">0</b></div>
            <div class="log-box"><span>عصر</span><b id="log-afternoon">0</b></div>
            <div class="log-box"><span>شب</span><b id="log-night">0</b></div>
        </div>
    </div>

    <div class="buttons">
        <button class="add-btn" onclick="addPuff(3)">+3</button>
        <button class="add-btn" onclick="addPuff(5)">+5</button>
        <button class="add-btn" onclick="addPuff(7)">+7</button>
    </div>
    <button class="undo-btn" onclick="undoPuff()">بازگشت</button>

    <h3>تاریخچه</h3>
    <div id="history-list"></div>

    <script>
        let data = JSON.parse(localStorage.getItem('puffData')) || { 
            date: new Date().toLocaleDateString('fa-IR'), 
            count: 0, morning: 0, afternoon: 0, night: 0 
        };
        let history = JSON.parse(localStorage.getItem('puffHistory')) || [];

        function updateUI() {
            document.getElementById('total-count').innerText = data.count;
            document.getElementById('log-date').innerText = data.date.split('/')[2]; // نمایش روز
            document.getElementById('log-morning').innerText = data.morning;
            document.getElementById('log-afternoon').innerText = data.afternoon;
            document.getElementById('log-night').innerText = data.night;
            
            // رندر تاریخچه
            const histList = document.getElementById('history-list');
            histList.innerHTML = '';
            [...history].reverse().forEach(item => {
                const div = document.createElement('div');
                div.className = 'card';
                div.style.padding = '10px';
                div.innerHTML = `
                    <div class="log-grid">
                        <div class="log-box"><span>${item.date.split('/')[1]}/${item.date.split('/')[2]}</span><b>تاریخ</b></div>
                        <div class="log-box"><span>صبح</span><b>${item.morning}</b></div>
                        <div class="log-box"><span>عصر</span><b>${item.afternoon}</b></div>
                        <div class="log-box"><span>شب</span><b>${item.night}</b></div>
                    </div>
                `;
                histList.appendChild(div);
            });

            localStorage.setItem('puffData', JSON.stringify(data));
            localStorage.setItem('puffHistory', JSON.stringify(history));
        }

        function getPeriod() {
            const hour = new Date().getHours();
            if (hour >= 7 && hour < 14) return 'morning';
            if (hour >= 14 && hour < 20) return 'afternoon';
            return 'night';
        }

        function addPuff(amount) {
            data.count += amount;
            data[getPeriod()] += amount;
            updateUI();
        }

        function undoPuff() {
            alert("قابلیت بازگشت در نسخه تاریخچه‌دار نیازمند سیستم دقیق‌تر است؛ فعلاً به سادگی ثبت کنید.");
        }

        // بررسی ریست ساعت ۷ صبح
        function checkReset() {
            const now = new Date();
            const todayStr = now.toLocaleDateString('fa-IR');
            if (now.getHours() === 7 && data.date !== todayStr) {
                history.push({...data});
                data = { date: todayStr, count: 0, morning: 0, afternoon: 0, night: 0 };
                updateUI();
            }
        }

        setInterval(checkReset, 60000);
        updateUI();
    </script>
</body>
</html>
